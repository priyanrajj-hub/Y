name: attendance_ble_test
description: "BLE proximity detection test — Phase 1 (Option 1: local-only broadcast confirmation)"
publish_to: 'none'
version: 0.1.0

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_blue_plus: ^1.32.12      # Faculty side — BLE scanning (central role)
  flutter_ble_peripheral: ^1.2.5   # Student side — BLE advertising (peripheral role)
  permission_handler: ^11.3.1      # Runtime Bluetooth/location permissions

dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
