name: attendance_ble_test
description: "BLE proximity detection test — Phase 1 (Option 1: local-only broadcast confirmation)"
publish_to: 'none'
version: 0.1.0

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_blue_plus: ^1.32.12      # Faculty side — BLE scanning (central role)
  flutter_ble_peripheral: ^1.2.5   # Student side — BLE advertising (peripheral role)
  permission_handler: ^11.3.1      # Runtime Bluetooth/location permissions
  firebase_core: ^3.12.1           # Firebase initialization
  firebase_auth: ^5.5.1            # Email/password authentication
  cloud_firestore: ^5.6.5          # User profiles, pending verification status
  firebase_storage: ^12.4.4        # Profile photo uploads
  local_auth: ^2.3.0               # Biometric (fingerprint/face) second factor
  image_picker: ^1.1.2             # Profile photo selection during registration
  cloud_functions: ^5.1.1          # Call Firebase Cloud Functions for verification


dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
